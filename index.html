<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Coolest 7th Grader Website</title>
</head>
<body style="background-color: #1a1a2e; color: #e2e2e2; font-family: sans-serif; text-align: center; padding-top: 80px;">

    <h1 style="color: #00f2fe; font-size: 2.5rem; margin-bottom: 20px;">Hello World! 👋</h1>
    
    <p style="font-size: 1.2rem; line-height: 1.6; margin: 0 auto 30px auto; max-width: 600px;">
        I'm quite an adventurous dude who likes books and texts. 
        My current goal is to become the smartest student in my Informatics class!
    </p>

    <!-- TOMBOL INTERAKTIF -->
    <button onclick="revealSecret()" style="background-color: #4ecca3; color: #1a1a2e; border: none; padding: 15px 30px; border-radius: 50px; font-size: 1rem; font-weight: bold; cursor: pointer; box-shadow: 0px 4px 15px rgba(78, 204, 163, 0.4); margin-bottom: 20px;">
        💥 CLICK FOR A SECRET MESSAGE
    </button>

    <!-- TEMPAT PESAN RAHASIA MUNCUL -->
    <p id="secretMessage" style="font-size: 1.5rem; color: #ff2e63; font-weight: bold; margin-top: 20px; display: none;"></p>

    <br>

    <div style="background-color: #16213e; border: 1px solid #0f3460; display: inline-block; padding: 15px 30px; border-radius: 50px; font-weight: bold; letter-spacing: 1px; color: #4ecca3; margin-top: 20px;">
        🚀 STATUS: CODING IN THE ZONE (2026)
    </div>

    <!-- KODE JAVASCRIPT -->
    <script>
        function revealSecret() {
            var message = document.getElementById("secretMessage");
            message.innerHTML = "Mission Accomplished! You are now officially tracking the coolest coder in 7th grade! 🚀😎";
            message.style.display = "block";
        }
    </script>

</body>
</html>
